name: monitor-meta

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: monitor-github-meta
  cancel-in-progress: true

jobs:
  monitor-meta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull current GitHub meta
        id: fetch
        run: |
          META_URL="https://api.github.com/meta"
          set +e
          HTTP_CODE=$(curl -sS --connect-timeout 15 --max-time 60 -w "%{http_code}" -o meta.json "$META_URL")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "Failed to fetch $META_URL (curl exit $CURL_EXIT). Check network connectivity and GitHub API availability."
            exit 1
          fi

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch $META_URL (HTTP $HTTP_CODE). Check GitHub API status and workflow network access."
            exit 1
          fi

          if [ ! -s meta.json ]; then
            echo "Fetched meta.json is empty"
            exit 1
          fi

          jq -e . meta.json > /dev/null || { echo "meta.json is not valid JSON"; exit 1; }
          jq -e 'has("hooks") and has("actions") and has("web") and has("api") and has("git") and has("pages") and has("packages")' meta.json > /dev/null || {
            echo "meta.json is missing one or more required sections (hooks/actions/web/api/git/pages/packages)"
            exit 1
          }

          jq -e '
            {
              hooks,
              actions,
              web,
              api,
              git,
              pages,
              packages
            }
            | with_entries(
                .value |= (
                  if type == "array" then sort
                  else .
                  end
                )
              )
          ' meta.json > trimmed-meta.json

          jq -e 'type == "object" and (to_entries | all(.value | type == "array"))' trimmed-meta.json > /dev/null || {
            echo "trimmed-meta.json has invalid section structure; expected arrays for all tracked sections"
            exit 1
          }
          sha256sum trimmed-meta.json | cut -d ' ' -f1 > meta.hash

          echo "new_hash=$(cat meta.hash)" >> $GITHUB_OUTPUT

      - name: Load previous data (if any)
        id: baseline
        run: |
          if [ -f .meta.last.json ]; then
            echo "has_baseline=true" >> $GITHUB_OUTPUT
          else
            echo "{}" > .meta.last.json
            echo "has_baseline=false" >> $GITHUB_OUTPUT
          fi

      - name: Save first-time baseline and exit
        if: steps.baseline.outputs.has_baseline == 'false'
        run: |
          echo "Saving initial baseline..."
          cp trimmed-meta.json .meta.last.json
          cp meta.hash .meta.last.hash
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .meta.last.*
          git commit -m "Initial baseline snapshot"
          git push
          {
            echo "### monitor-meta summary"
            echo "- Baseline present: false (initialized in this run)"
            echo "- New hash: \`$(cat meta.hash)\`"
            echo "- Change detected: n/a (first baseline run)"
          } >> $GITHUB_STEP_SUMMARY

      - name: Compare for changes
        id: compare
        if: steps.baseline.outputs.has_baseline == 'true'
        run: |
          OLD_HASH=$(cat .meta.last.hash 2>/dev/null || echo "")
          NEW_HASH=$(cat meta.hash)
          CHANGED_SECTIONS=$(jq -r --slurpfile old .meta.last.json '
            to_entries
            | map(select(.value != ($old[0][.key] // [])) | .key)
            | join(",")
          ' trimmed-meta.json)

          echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT
          echo "changed_sections=$CHANGED_SECTIONS" >> $GITHUB_OUTPUT

          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            CHANGE_FLAG="true"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            CHANGE_FLAG="false"
          fi

          {
            echo "### monitor-meta summary"
            echo "- Baseline present: true"
            echo "- Old hash: \`$OLD_HASH\`"
            echo "- New hash: \`$NEW_HASH\`"
            echo "- Change detected: $CHANGE_FLAG"
            if [ -n "$CHANGED_SECTIONS" ]; then
              echo "- Changed sections: $CHANGED_SECTIONS"
            else
              echo "- Changed sections: none"
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Exit if no change
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'false'
        run: |
          echo "No change detected. Exiting."
          exit 0

      - name: Generate IP diff inline
        id: diff
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'true'
        run: |
          echo ":rotating_light: **GitHub Meta IP changes detected**" > ip.diff.md
          echo "" >> ip.diff.md
          echo "Old hash: \`${{ steps.compare.outputs.old_hash }}\`" >> ip.diff.md
          echo "New hash: \`${{ steps.compare.outputs.new_hash }}\`" >> ip.diff.md
          if [ -n "${{ steps.compare.outputs.changed_sections }}" ]; then
            echo "Changed sections: ${{ steps.compare.outputs.changed_sections }}" >> ip.diff.md
          fi
          echo "" >> ip.diff.md

          total_added=0
          total_removed=0

          echo "## :heavy_plus_sign: Added IPs" >> ip.diff.md
          while IFS= read -r section; do
            added_count=$(jq -r --arg section "$section" --slurpfile old .meta.last.json '
              (
                (.[$section] // [])
                - ($old[0][$section] // [])
              ) | length
            ' trimmed-meta.json)

            if [ "$added_count" -gt 0 ]; then
              added=$(jq -r --arg section "$section" --slurpfile old .meta.last.json '
              (.[$section] // []) as $new
              | ($old[0][$section] // []) as $old_values
              | ($new - $old_values)[]
            ' trimmed-meta.json)
              total_added=$((total_added + added_count))
              echo "### $section" >> ip.diff.md
              echo "$added" | sed 's/^/- /' >> ip.diff.md
              echo "" >> ip.diff.md
            fi
          done < <(jq -r 'keys[]' trimmed-meta.json)

          echo "## :heavy_minus_sign: Removed IPs" >> ip.diff.md
          while IFS= read -r section; do
            removed_count=$(jq -r --arg section "$section" --slurpfile old .meta.last.json '
              (
                ($old[0][$section] // [])
                - (.[$section] // [])
              ) | length
            ' trimmed-meta.json)

            if [ "$removed_count" -gt 0 ]; then
              removed=$(jq -r --arg section "$section" --slurpfile old .meta.last.json '
              (.[$section] // []) as $new
              | ($old[0][$section] // []) as $old_values
              | ($old_values - $new)[]
            ' trimmed-meta.json)
              total_removed=$((total_removed + removed_count))
              echo "### $section" >> ip.diff.md
              echo "$removed" | sed 's/^/- /' >> ip.diff.md
              echo "" >> ip.diff.md
            fi
          done < <(jq -r 'keys[]' trimmed-meta.json)

          echo "added_count=$total_added" >> $GITHUB_OUTPUT
          echo "removed_count=$total_removed" >> $GITHUB_OUTPUT

          {
            echo "- Added IPs: $total_added"
            echo "- Removed IPs: $total_removed"
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload full diff artifact
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: github-meta-ip-diff
          path: ip.diff.md

      - name: Create or update issue for IP changes
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = ':rotating_light: GitHub Meta IP Change Detected';
            const labels = ['ip-change', 'github-meta'];
            const { owner, repo } = context.repo;

            const MAX_BODY = 65536;
            const SAFETY_MARGIN = 500;
            const TRUNCATE_AT = MAX_BODY - SAFETY_MARGIN;

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const truncationNotice = `\n\n---\n> :warning: **Diff truncated** — the full diff exceeds GitHub's 65,536-character issue body limit. Download the complete diff from the **\`github-meta-ip-diff\`** artifact attached to [workflow run #${context.runId}](${runUrl}).`;

            let body = fs.readFileSync('ip.diff.md', 'utf8');
            if (body.length > TRUNCATE_AT) {
              body = body.slice(0, TRUNCATE_AT - truncationNotice.length) + truncationNotice;
            }

            let existing = null;
            let page = 1;
            const maxPages = 10;
            while (!existing && page <= maxPages) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                labels: labels.join(','),
                per_page: 100,
                page
              });

              if (!issues.length) {
                break;
              }

              existing = issues.find((issue) => issue.title === title);
              if (issues.length < 100) {
                break;
              }

              page += 1;
            }

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
                labels
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Send webhook notification
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'true' && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          ADDED="${{ steps.diff.outputs.added_count }}"
          REMOVED="${{ steps.diff.outputs.removed_count }}"
          CHANGED_SECTIONS="${{ steps.compare.outputs.changed_sections }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD=$(jq -n \
            --arg added "$ADDED" \
            --arg removed "$REMOVED" \
            --arg sections "$CHANGED_SECTIONS" \
            --arg run_url "$RUN_URL" \
            '{text: (
              ":rotating_light: GitHub Meta IP Change Detected — " + $added + " added, " + $removed + " removed" +
              (if $sections != "" then "\nChanged sections: " + $sections else "" end) +
              "\nDetails: " + $run_url
            )}')

          HTTP_CODE=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Webhook notification sent (HTTP $HTTP_CODE)"
          else
            echo "::warning::Webhook notification failed (HTTP $HTTP_CODE)"
            cat /tmp/webhook_response.txt || true
          fi

      - name: Save new meta for future comparison
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'true'
        run: |
          cp trimmed-meta.json .meta.last.json
          cp meta.hash .meta.last.hash
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .meta.last.json .meta.last.hash
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "Update baseline after detected meta change"
            git push
          fi
