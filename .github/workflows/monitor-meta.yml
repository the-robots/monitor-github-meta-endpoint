name: monitor-meta

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: monitor-github-meta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitor-meta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull current GitHub meta
        id: fetch
        run: |
          HTTP_CODE=$(curl -sS --connect-timeout 10 --max-time 30 -w "%{http_code}" -o meta.json https://api.github.com/meta)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch https://api.github.com/meta (HTTP $HTTP_CODE)"
            exit 1
          fi

          if [ ! -s meta.json ]; then
            echo "Fetched meta.json is empty"
            exit 1
          fi

          jq -e . meta.json > /dev/null
          jq -e 'has("hooks") and has("actions") and has("web") and has("api") and has("git") and has("pages") and has("packages")' meta.json > /dev/null

          jq -e '
            {
              hooks,
              actions,
              web,
              api,
              git,
              pages,
              packages
            }
            | with_entries(
                .value |= (
                  if type == "array" then (map(tostring) | sort)
                  else .
                  end
                )
              )
          ' meta.json > trimmed-meta.json

          jq -e 'type == "object" and (to_entries | all(.value | type == "array"))' trimmed-meta.json > /dev/null
          sha256sum trimmed-meta.json | cut -d ' ' -f1 > meta.hash

          echo "new_hash=$(cat meta.hash)" >> $GITHUB_OUTPUT

      - name: Load previous data (if any)
        id: baseline
        run: |
          if [ -f .meta.last.json ]; then
            echo "has_baseline=true" >> $GITHUB_OUTPUT
          else
            echo "{}" > .meta.last.json
            echo "has_baseline=false" >> $GITHUB_OUTPUT
          fi

      - name: Save first-time baseline and exit
        if: steps.baseline.outputs.has_baseline == 'false'
        run: |
          echo "Saving initial baseline..."
          cp trimmed-meta.json .meta.last.json
          cp meta.hash .meta.last.hash
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .meta.last.*
          git commit -m "Initial baseline snapshot"
          git push
          {
            echo "### monitor-meta summary"
            echo "- Baseline present: false (initialized in this run)"
            echo "- New hash: \`$(cat meta.hash)\`"
            echo "- Change detected: n/a (first baseline run)"
          } >> $GITHUB_STEP_SUMMARY

      - name: Compare for changes
        id: compare
        if: steps.baseline.outputs.has_baseline == 'true'
        run: |
          OLD_HASH=$(cat .meta.last.hash 2>/dev/null || echo "")
          NEW_HASH=$(cat meta.hash)
          CHANGED_SECTIONS=$(jq -r --slurpfile old .meta.last.json '
            to_entries
            | map(select(.value != ($old[0][.key] // [])) | .key)
            | join(",")
          ' trimmed-meta.json)

          echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT
          echo "changed_sections=$CHANGED_SECTIONS" >> $GITHUB_OUTPUT

          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            CHANGE_FLAG="true"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            CHANGE_FLAG="false"
          fi

          {
            echo "### monitor-meta summary"
            echo "- Baseline present: true"
            echo "- Old hash: \`$OLD_HASH\`"
            echo "- New hash: \`$NEW_HASH\`"
            echo "- Change detected: $CHANGE_FLAG"
            if [ -n "$CHANGED_SECTIONS" ]; then
              echo "- Changed sections: $CHANGED_SECTIONS"
            else
              echo "- Changed sections: none"
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Exit if no change
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'false'
        run: |
          echo "No change detected. Exiting."
          exit 0

      - name: Generate IP diff inline
        id: diff
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'true'
        run: |
          echo ":rotating_light: **GitHub Meta IP changes detected**" > ip.diff.md
          echo "" >> ip.diff.md
          echo "Old hash: \`${{ steps.compare.outputs.old_hash }}\`" >> ip.diff.md
          echo "New hash: \`${{ steps.compare.outputs.new_hash }}\`" >> ip.diff.md
          if [ -n "${{ steps.compare.outputs.changed_sections }}" ]; then
            echo "Changed sections: ${{ steps.compare.outputs.changed_sections }}" >> ip.diff.md
          fi
          echo "" >> ip.diff.md

          total_added=0
          total_removed=0

          echo "## :heavy_plus_sign: Added IPs" >> ip.diff.md
          while IFS= read -r section; do
            added=$(jq -r --arg section "$section" --slurpfile old .meta.last.json '
              (.[$section] // []) as $new
              | ($old[0][$section] // []) as $old_values
              | ($new - $old_values)[]
            ' trimmed-meta.json)

            added_count=$(printf "%s\n" "$added" | sed '/^$/d' | wc -l | tr -d ' ')

            if [ "$added_count" -gt 0 ]; then
              total_added=$((total_added + added_count))
              echo "### $section" >> ip.diff.md
              echo "$added" | sed 's/^/- /' >> ip.diff.md
              echo "" >> ip.diff.md
            fi
          done < <(jq -r 'keys[]' trimmed-meta.json)

          echo "## :heavy_minus_sign: Removed IPs" >> ip.diff.md
          while IFS= read -r section; do
            removed=$(jq -r --arg section "$section" --slurpfile old .meta.last.json '
              (.[$section] // []) as $new
              | ($old[0][$section] // []) as $old_values
              | ($old_values - $new)[]
            ' trimmed-meta.json)

            removed_count=$(printf "%s\n" "$removed" | sed '/^$/d' | wc -l | tr -d ' ')

            if [ "$removed_count" -gt 0 ]; then
              total_removed=$((total_removed + removed_count))
              echo "### $section" >> ip.diff.md
              echo "$removed" | sed 's/^/- /' >> ip.diff.md
              echo "" >> ip.diff.md
            fi
          done < <(jq -r 'keys[]' trimmed-meta.json)

          echo "added_count=$total_added" >> $GITHUB_OUTPUT
          echo "removed_count=$total_removed" >> $GITHUB_OUTPUT

          {
            echo "- Added IPs: $total_added"
            echo "- Removed IPs: $total_removed"
          } >> $GITHUB_STEP_SUMMARY

      - name: Create or update issue for IP changes
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = ':rotating_light: GitHub Meta IP Change Detected';
            const labels = ['ip-change', 'github-meta'];
            const body = fs.readFileSync('ip.diff.md', 'utf8');
            const { owner, repo } = context.repo;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
                labels
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Save new meta for future comparison
        if: steps.baseline.outputs.has_baseline == 'true' && steps.compare.outputs.changed == 'true'
        run: |
          cp trimmed-meta.json .meta.last.json
          cp meta.hash .meta.last.hash
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .meta.last.json .meta.last.hash
          git commit -m "Update baseline after detected meta change" || echo "Nothing to commit"
          git push
